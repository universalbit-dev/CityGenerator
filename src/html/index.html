<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CityGenerator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- custom stylesheet (generated by bundler) -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Design tokens ──────────────────────────────────── */
    :root {
      --accent:  #0d6efd;
      --radius:  .75rem;
      --card-sh: 0 2px 10px rgba(0,0,0,.08);
    }

    body { background: #f0f2f5; }

    /* ── App header ─────────────────────────────────────── */
    .app-header {
      background: linear-gradient(135deg,#0d1b2a 0%,#1a3a5c 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    /* pulsing status dot */
    #sim-status-dot {
      flex-shrink: 0;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #28a745;
      box-shadow: 0 0 0 3px #28a74533;
      animation: pulse-green 2s infinite;
    }
    #sim-status-dot.paused {
      background: #ffc107;
      box-shadow: 0 0 0 3px #ffc10733;
      animation: pulse-amber 2s infinite;
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 3px #28a74533; }
      50%      { box-shadow: 0 0 0 6px #28a74511; }
    }
    @keyframes pulse-amber {
      0%,100% { box-shadow: 0 0 0 3px #ffc10733; }
      50%      { box-shadow: 0 0 0 6px #ffc10711; }
    }

    /* ── White cards ─────────────────────────────────────── */
    .sim-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-sh);
    }

    /* ── Map canvas fills its card ───────────────────────── */
    #map-canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius);
    }

    /* ── Controls bar ────────────────────────────────────── */
    .section-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: .6rem;
    }
    .btn-round {
      border-radius: 10px;
      padding: .45rem 1rem;
      font-size: .92rem;
      font-weight: 600;
      transition: transform .1s;
    }
    .btn-round:active { transform: scale(.96); }

    /* ── Model info banner ───────────────────────────────── */
    #manager-info {
      display: none;
      background: linear-gradient(90deg,#e8f0fe,#f0faf4);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: .75rem 1.1rem;
    }
    #current-model-name { color: var(--accent); font-weight: 700; }
    #model-tip          { color: #6c757d; margin: 0; font-size: .9rem; }

    /* ── Charts: canvas fills container; index.js sizes them ── */
    #state-chart,
    #rewardTrendChart {
      display: block;
      width: 100% !important;
      height: auto !important;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .app-footer {
      font-size: .76rem;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>

<body>
<div class="container-lg py-3 d-flex flex-column gap-3">

  <!-- ══ HEADER ══════════════════════════════════════════ -->
  <header class="app-header">
    <span id="sim-status-dot" title="Simulation running"></span>
    <h1>CityGenerator <span class="badge bg-secondary ms-1" style="font-size:.7rem;vertical-align:middle;">Deep Q-Learning</span></h1>
  </header>

  <!-- ══ MAP ═════════════════════════════════════════════ -->
  <div class="sim-card p-0 overflow-hidden">
    <canvas id="map-canvas" width="900" height="360"></canvas>
  </div>

  <!-- ══ CONTROLS ════════════════════════════════════════ -->
  <div class="sim-card px-3 py-2">
    <p class="section-label mb-2">Simulation Controls</p>
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <button id="pause-btn"             type="button" class="btn btn-warning  btn-round">⏸ Pause</button>
      <button id="resume-btn"            type="button" class="btn btn-success  btn-round">▶ Resume</button>
      <button id="random-city-model-btn" type="button" class="btn btn-primary  btn-round">🔀 Random City Model</button>
      <button id="reset-btn"             type="button" class="btn btn-outline-secondary btn-round ms-auto">↺ Reset State</button>
    </div>
  </div>

  <!-- ══ MODEL BANNER ════════════════════════════════════ -->
  <div id="manager-info" role="status" aria-live="polite" aria-hidden="true">
    <div class="d-flex gap-2 align-items-start">
      <span style="font-size:1.2rem;line-height:1.4">🏙️</span>
      <div>
        <div class="fw-semibold" style="font-size:.95rem">
          Active Model: <span id="current-model-name">Unknown Model</span>
        </div>
        <p id="model-tip">No tip available for this model.</p>
      </div>
    </div>
  </div>

  <!-- ══ CHARTS ══════════════════════════════════════════ -->
  <div class="row g-3">

    <!-- City State bar chart -->
    <div class="col-lg-5 col-12">
      <div class="sim-card p-3 h-100">
        <p class="section-label">City State Metrics</p>
        <canvas id="state-chart" width="560" height="280"></canvas>
      </div>
    </div>

    <!-- Reward trend line chart -->
    <div class="col-lg-7 col-12">
      <div class="sim-card p-3 h-100">
        <p class="section-label">Reward Trend</p>
        <canvas id="rewardTrendChart" width="760" height="280"></canvas>
      </div>
    </div>

  </div>

  <!-- ══ FOOTER ══════════════════════════════════════════ -->
  <footer class="app-footer pb-2">
    CityGenerator · Deep Q-Learning Simulator ·
    <a href="https://github.com/universalbit-dev/CityGenerator"
       target="_blank" rel="noopener" class="text-decoration-none">GitHub</a>
  </footer>

</div><!-- /container -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ══ Simulation UI helper ═══════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Model tips for every city manager ───────────────────────────────── */
  const MODEL_TIPS = {
    // CircularCityManager
    'Circular City':              '♻️ Boost local production, recycling & renewable energy to close the resource loop!',
    'CircularCityManager':        '♻️ Boost local production, recycling & renewable energy to close the resource loop!',
    // UrbanFabricManager
    'Urban Fabric':               '🏗️ Invest in roads, power grid & green space to grow the city fabric.',
    'UrbanFabricManager':         '🏗️ Invest in roads, power grid & green space to grow the city fabric.',
    // CivicEcosystemManager
    'Civic Ecosystem':            '🏛️ Engage citizens, open data & grow business density for a thriving ecosystem.',
    'CivicEcosystemManager':      '🏛️ Engage citizens, open data & grow business density for a thriving ecosystem.',
    // SmartCityStateManager
    'Smart City':                 '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    'SmartCityStateManager':      '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    'Smart City State':           '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    // ResilientCityModelManager
    'Resilient City Model':       '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    'ResilientCityModelManager':  '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    'Resilient City':             '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    // CommunityCommonsManager
    'Community Commons':          '🤝 Share resources, open public spaces & raise community happiness.',
    'CommunityCommonsManager':    '🤝 Share resources, open public spaces & raise community happiness.',
    // PermacultureDesignManager
    'Permaculture Design':        '🌱 Apply permaculture principles for a regenerative urban future.',
    'PermacultureDesignManager':  '🌱 Apply permaculture principles for a regenerative urban future.',
    // CookielessCityAgent
    'Cookieless City Agent':      '🔒 Privacy-first agent — your choices boost digital safety.',
    'CookielessCityAgent':        '🔒 Privacy-first agent — your choices boost digital safety.',
    'Cookieless City':            '🔒 Privacy-first agent — your choices boost digital safety.',
  };

  /* ── state ───────────────────────────────────────────────────────────── */
  let lastKnownModel = null;
  let pollTimer      = null;

  /* ── tiny DOM helper ─────────────────────────────────────────────────── */
  const $id = id => document.getElementById(id);

  /* ── simulation status dot ───────────────────────────────────────────── */
  function setSimRunning(running) {
    const dot = $id('sim-status-dot');
    if (!dot) return;
    dot.classList.toggle('paused', !running);
    dot.title = running ? 'Simulation running' : 'Simulation paused';
  }

  /* ── model info banner ───────────────────────────────────────────────── */
  function setManagerVisible(visible) {
    const m = $id('manager-info');
    if (!m) return;
    m.style.display = visible ? '' : 'none';
    m.setAttribute('aria-hidden', visible ? 'false' : 'true');
  }

  function updateModelDisplay(name, tip) {
    const normalized = (typeof name === 'string' && name.trim()) ? name.trim() : null;
    const resolvedTip = tip
      || (normalized && MODEL_TIPS[normalized])
      || 'No tip available for this model.';

    const nameEl = $id('current-model-name');
    const tipEl  = $id('model-tip');
    if (nameEl) nameEl.textContent = normalized || 'Unknown Model';
    if (tipEl)  tipEl.textContent  = resolvedTip;

    setManagerVisible(Boolean(normalized));
    lastKnownModel = normalized || null;
  }

  /* public API consumed by index.js */
  window.setSimulationModelDisplay = updateModelDisplay;

  /* ── model inference (reads every known global set by index.js) ──────── */
  function safeGet(obj, path) {
    try { return path.reduce((a, k) => (a && a[k] !== undefined ? a[k] : undefined), obj); }
    catch (e) { return undefined; }
  }

  function gatherModelCandidates() {
    const c = [];
    try {
      if (window.simulationModel)
        c.push(window.simulationModel.name,
               window.simulationModel.modelName,
               window.simulationModel.title);
    } catch (_) {}

    ['currentModelName','modelName','initialModelName'].forEach(k => {
      if (window[k]) c.push(window[k]);
    });

    try {
      if (window.manager)
        c.push(window.manager.modelName,
               safeGet(window,['manager','model','name']),
               safeGet(window,['manager','currentModel','name']),
               safeGet(window,['manager','current','name']),
               safeGet(window,['manager','name']));
    } catch (_) {}

    try {
      if (window.app)
        c.push(safeGet(window,['app','model','name']),
               safeGet(window,['app','currentModel','name']));
    } catch (_) {}

    try {
      if (document.body?.dataset?.modelName) c.push(document.body.dataset.modelName);
      const el2 = document.querySelector('[data-model-name]');
      if (el2) c.push(el2.dataset?.modelName, el2.getAttribute?.('data-model-name'));
    } catch (_) {}

    return c.map(v => (typeof v === 'string' ? v.trim() : v)).filter(Boolean);
  }

  function inferModel() {
    const candidates = gatherModelCandidates();
    return candidates.length ? candidates[0] : null;
  }

  /* ── polling ─────────────────────────────────────────────────────────── */
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(() => {
      const m = inferModel();
      if (m && m !== lastKnownModel) updateModelDisplay(m);
    }, 500);
  }

  /* ── simulationModelChanged event (fired by manager constructor) ─────── */
  window.addEventListener('simulationModelChanged', function (e) {
    const d = e?.detail ?? null;
    if (d?.name) updateModelDisplay(d.name, d.tip);
    else { const m = inferModel(); if (m) updateModelDisplay(m); }
  });

  /* ── MutationObserver ────────────────────────────────────────────────── */
  const mo = new MutationObserver(mutations => {
    for (const m of mutations) {
      if ((m.type === 'attributes' && m.attributeName?.startsWith('data-')) ||
           m.type === 'childList') {
        const inferred = inferModel();
        if (inferred && inferred !== lastKnownModel) updateModelDisplay(inferred);
      }
    }
  });

  /* ── DOMContentLoaded ────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {

    /* status dot: wire buttons */
    const pauseBtn  = $id('pause-btn');
    const resumeBtn = $id('resume-btn');
    const resetBtn  = $id('reset-btn');

    if (pauseBtn)  pauseBtn.addEventListener('click',  () => setSimRunning(false));
    if (resumeBtn) resumeBtn.addEventListener('click',  () => setSimRunning(true));

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        try {
          if (window.manager?.reset) window.manager.reset();
        } catch (_) {}
      });
    }

    /* initial model display */
    const m = inferModel();
    updateModelDisplay(m || null, m ? MODEL_TIPS[m] : null);

    startPolling();

    try {
      mo.observe(document.body, { attributes: true, childList: true, subtree: true });
    } catch (e) {
      console.warn('Model observer failed to start', e);
    }
  });

  /* ── debug helper ────────────────────────────────────────────────────── */
  window.getSimulationModelDisplay = () => ({
    name: $id('current-model-name')?.textContent ?? null,
    tip:  $id('model-tip')?.textContent          ?? null,
  });

})();
</script>

</body>
</html>

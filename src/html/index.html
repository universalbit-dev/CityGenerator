<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CityGenerator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- bundler-generated stylesheet -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Design tokens ───────────────────────────────────── */
    :root {
      --accent:  #0d6efd;
      --radius:  .75rem;
      --card-sh: 0 2px 10px rgba(0,0,0,.08);
    }

    body { background: #f0f2f5; }

    /* ── App header ──────────────────────────────────────── */
    .app-header {
      background: linear-gradient(135deg,#0d1b2a 0%,#1a3a5c 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    /* pulsing status dot */
    #sim-status-dot {
      flex-shrink: 0;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #28a745;
      box-shadow: 0 0 0 3px #28a74533;
      animation: pulse-green 2s infinite;
    }
    #sim-status-dot.paused {
      background: #ffc107;
      box-shadow: 0 0 0 3px #ffc10733;
      animation: pulse-amber 2s infinite;
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 3px #28a74533; }
      50%      { box-shadow: 0 0 0 6px #28a74511; }
    }
    @keyframes pulse-amber {
      0%,100% { box-shadow: 0 0 0 3px #ffc10733; }
      50%      { box-shadow: 0 0 0 6px #ffc10711; }
    }

    /* ── Generic white card ──────────────────────────────── */
    .sim-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-sh);
    }

    /* ── Map canvas ──────────────────────────────────────── */
    #map-canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius);
    }

    /* ── Controls bar ────────────────────────────────────── */
    .section-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: .6rem;
    }
    .btn-round {
      border-radius: 10px;
      padding: .45rem 1rem;
      font-size: .92rem;
      font-weight: 600;
      transition: transform .1s;
    }
    .btn-round:active { transform: scale(.96); }

    /* ── Model info banner (index.js writes innerHTML here) ── */
    #manager-info {
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      background: linear-gradient(90deg,#e8f0fe,#f0faf4);
      padding: .75rem 1.1rem;
      font-size: .95rem;
    }
    #manager-info .model-name { color: var(--accent); font-weight: 700; }
    #manager-info .model-tip  { color: #6c757d; margin: 0; }

    /* ── Charts container ────────────────────────────────── */
    #charts-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
      box-sizing: border-box;
    }
    #charts-container > div[data-chart-wrapper="1"] {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-sh);
      padding: 1rem 1rem .5rem;
      box-sizing: border-box;
    }

    /* reward value label index.js appends inside the reward wrapper */
    #reward-value {
      font-weight: 700;
      font-size: .9rem;
      text-align: center;
      margin-top: 6px;
      color: #212529;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .app-footer {
      font-size: .76rem;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>

<body>
<div class="container-lg py-3 d-flex flex-column gap-3">

  <!-- ══ HEADER ════════════════════════════════════════════ -->
  <header class="app-header">
    <span id="sim-status-dot" title="Simulation running"></span>
    <h1>
      CityGenerator
      <span class="badge bg-secondary ms-1"
            style="font-size:.7rem;vertical-align:middle;">Deep Q-Learning</span>
    </h1>
  </header>

  <!-- ══ MAP ═══════════════════════════════════════════════ -->
  <div class="sim-card p-0 overflow-hidden">
    <canvas id="map-canvas" width="900" height="360"></canvas>
  </div>

  <!-- ══ CONTROLS ══════════════════════════════════════════ -->
  <div class="sim-card px-3 py-2">
    <p class="section-label mb-2">Simulation Controls</p>
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <button id="pause-btn"             type="button"
              class="btn btn-warning  btn-round">⏸ Pause</button>
      <button id="resume-btn"            type="button"
              class="btn btn-success  btn-round">▶ Resume</button>
      <button id="random-city-model-btn" type="button"
              class="btn btn-primary  btn-round">🔀 Random City Model</button>
      <button id="reset-btn"             type="button"
              class="btn btn-outline-secondary btn-round ms-auto">↺ Reset State</button>
    </div>
  </div>

  <!-- index.js owns innerHTML of this div via renderManagerInfo() -->
  <!-- It also appends a <select> dropdown here via setupUI()      -->
  <div id="manager-info" role="status" aria-live="polite"></div>

  <!-- index.js → ensureChartElements() appends chart wrappers here -->
  <div id="charts-container"></div>

  <!-- ══ FOOTER ════════════════════════════════════════════ -->
  <footer class="app-footer pb-2">
    CityGenerator · Deep Q-Learning Simulator ·
    <a href="https://github.com/universalbit-dev/CityGenerator"
       target="_blank" rel="noopener"
       class="text-decoration-none">GitHub</a>
  </footer>

</div><!-- /container -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ══ Simulation UI helper ══════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Model tips for all 8 city managers ─────────────────────────────── */
  const MODEL_TIPS = {
    'Circular City':             '♻️ Boost local production, recycling & renewable energy to close the resource loop!',
    'CircularCityManager':       '♻️ Boost local production, recycling & renewable energy to close the resource loop!',
    'Urban Fabric':              '🏗️ Invest in roads, power grid & green space to grow the city fabric.',
    'UrbanFabricManager':        '🏗️ Invest in roads, power grid & green space to grow the city fabric.',
    'Civic Ecosystem':           '🏛️ Engage citizens, open data & grow business density for a thriving ecosystem.',
    'CivicEcosystemManager':     '🏛️ Engage citizens, open data & grow business density for a thriving ecosystem.',
    'Smart City':                '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    'SmartCityStateManager':     '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    'Smart City State':          '🤖 Deploy sensors, AI services & connectivity for a smarter city.',
    'Resilient City Model':      '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    'ResilientCityModelManager': '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    'Resilient City':            '🦾 Build redundancy, diversity & crisis readiness for a resilient city.',
    'Community Commons':         '🤝 Share resources, open public spaces & raise community happiness.',
    'CommunityCommonsManager':   '🤝 Share resources, open public spaces & raise community happiness.',
    'Permaculture Design':       '🌱 Apply permaculture principles for a regenerative urban future.',
    'PermacultureDesignManager': '🌱 Apply permaculture principles for a regenerative urban future.',
    'Cookieless City Agent':     '🔒 Privacy-first agent — your choices boost digital safety.',
    'CookielessCityAgent':       '🔒 Privacy-first agent — your choices boost digital safety.',
    'Cookieless City':           '🔒 Privacy-first agent — your choices boost digital safety.',
  };

  /* ── state ───────────────────────────────────────────────────────────── */
  let lastKnownModel = null;
  let pollTimer      = null;

  const $id = id => document.getElementById(id);

  /* ── status dot ──────────────────────────────────────────────────────── */
  function setSimRunning(running) {
    const dot = $id('sim-status-dot');
    if (!dot) return;
    dot.classList.toggle('paused', !running);
    dot.title = running ? 'Simulation running' : 'Simulation paused';
  }

  /* ── model display (pre-index.js only; index.js overwrites innerHTML) ── */
  function updateModelDisplay(name, tip) {
    /* Once index.js has written its own HTML (contains a span with inline color),
       step back and let it own the banner.                                       */
    const m = $id('manager-info');
    if (m && m.querySelector('span[style*="color"]')) return;

    const normalized = (typeof name === 'string' && name.trim()) ? name.trim() : null;
    if (!normalized) return;

    if (m) {
      /* ── FIX: build DOM with textContent instead of innerHTML ── */
      /* Clear existing children */
      while (m.firstChild) m.removeChild(m.firstChild);

      /* Header div: "Active Model: <span.model-name>" */
      const headerDiv = document.createElement('div');
      headerDiv.style.fontWeight   = '700';
      headerDiv.style.fontSize     = '1rem';
      headerDiv.style.marginBottom = '4px';
      headerDiv.appendChild(document.createTextNode('Active Model: '));
      const nameSpan = document.createElement('span');
      nameSpan.className   = 'model-name';
      nameSpan.textContent = normalized;           /* safe: no HTML parsing */
      headerDiv.appendChild(nameSpan);

      /* Tip paragraph */
      const tipP = document.createElement('p');
      tipP.className   = 'model-tip';
      tipP.textContent = tip || MODEL_TIPS[normalized] || 'No tip available for this model.';

      m.appendChild(headerDiv);
      m.appendChild(tipP);
    }

    lastKnownModel = normalized;
  }

  window.setSimulationModelDisplay = updateModelDisplay;

  /* ── model inference ─────────────────────────────────────────────────── */
  function safeGet(obj, path) {
    try { return path.reduce((a,k) => (a && a[k] !== undefined ? a[k] : undefined), obj); }
    catch (_) { return undefined; }
  }

  function gatherModelCandidates() {
    const c = [];
    try {
      if (window.simulationModel)
        c.push(window.simulationModel.name,
               window.simulationModel.modelName,
               window.simulationModel.title);
    } catch (_) {}
    ['currentModelName','modelName','initialModelName'].forEach(k => {
      if (window[k]) c.push(window[k]);
    });
    try {
      if (window.manager)
        c.push(window.manager.modelName,
               safeGet(window,['manager','model','name']),
               safeGet(window,['manager','currentModel','name']),
               safeGet(window,['manager','current','name']),
               safeGet(window,['manager','name']));
    } catch (_) {}
    try {
      if (window.city)
        c.push(window.city.modelName,
               safeGet(window,['city','constructor','name']));
    } catch (_) {}
    try {
      if (window.app)
        c.push(safeGet(window,['app','model','name']),
               safeGet(window,['app','currentModel','name']));
    } catch (_) {}
    try {
      if (document.body?.dataset?.modelName) c.push(document.body.dataset.modelName);
      const el = document.querySelector('[data-model-name]');
      if (el) c.push(el.dataset?.modelName, el.getAttribute?.('data-model-name'));
    } catch (_) {}
    return c.map(v => (typeof v === 'string' ? v.trim() : v)).filter(Boolean);
  }

  function inferModel() {
    const cands = gatherModelCandidates();
    return cands.length ? cands[0] : null;
  }

  /* ── polling ─────────────────────────────────────────────────────────── */
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(() => {
      const m = inferModel();
      if (m && m !== lastKnownModel) updateModelDisplay(m);
    }, 500);
  }

  /* ── simulationModelChanged event ────────────────────────────────────── */
  window.addEventListener('simulationModelChanged', function (e) {
    const d = e?.detail ?? null;
    if (d?.name) updateModelDisplay(d.name, d.tip);
    else { const m = inferModel(); if (m) updateModelDisplay(m); }
  });

  /* ── MutationObserver (lightweight — attributes + direct children only) ─ */
  const mo = new MutationObserver(() => {
    const inferred = inferModel();
    if (inferred && inferred !== lastKnownModel) updateModelDisplay(inferred);
  });

  /* ── DOMContentLoaded ────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    const pauseBtn  = $id('pause-btn');
    const resumeBtn = $id('resume-btn');
    const resetBtn  = $id('reset-btn');

    if (pauseBtn)  pauseBtn.addEventListener ('click', () => setSimRunning(false));
    if (resumeBtn) resumeBtn.addEventListener('click', () => setSimRunning(true));
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        try { if (window.manager?.reset) window.manager.reset(); } catch (_) {}
        try { if (window.city?.reset)    window.city.reset();    } catch (_) {}
      });
    }

    const m = inferModel();
    if (m) updateModelDisplay(m, MODEL_TIPS[m]);
    startPolling();

    try {
      mo.observe(document.body, { attributes: true, childList: true, subtree: false });
    } catch (e) { console.warn('Model observer failed to start', e); }
  });

  /* ── debug ───────────────────────────────────────────────────────────── */
  window.getSimulationModelDisplay = () => ({
    name: $id('manager-info')?.querySelector('.model-name')?.textContent ?? null,
    tip:  $id('manager-info')?.querySelector('.model-tip')?.textContent  ?? null,
  });

})();
</script>

</body>
</html>
